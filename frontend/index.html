<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --bg-card: #1a1a2e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --text-muted: #666;
            --accent: #0f3460;
            --accent-bright: #4a9eff;
            --accent-glow: rgba(74, 158, 255, 0.15);
            --border: #2a2a3e;
            --danger: #e74c3c;
            --success: #2ecc71;
            --warning: #f39c12;
            --sidebar-width: 320px;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        .app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }
        .sidebar.collapsed {
            transform: translateX(calc(-1 * var(--sidebar-width)));
            width: 0;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-header h2 {
            font-size: 14px;
            color: var(--accent-bright);
            flex: 1;
        }
        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .sidebar-tab:hover { color: var(--text-primary); }
        .sidebar-tab.active {
            color: var(--accent-bright);
            border-bottom-color: var(--accent-bright);
        }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        /* File browser */
        .file-path {
            padding: 8px 10px;
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-primary);
            border-radius: 6px;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .file-entry {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            gap: 8px;
            transition: background 0.15s;
        }
        .file-entry:hover { background: var(--bg-tertiary); }
        .file-entry .icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
        .file-entry .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-entry .size { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
        .file-entry .actions {
            display: none;
            gap: 4px;
        }
        .file-entry:hover .actions { display: flex; }
        .file-entry:hover .size { display: none; }
        .file-action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 2px 4px;
            font-size: 12px;
            border-radius: 3px;
        }
        .file-action-btn:hover { color: var(--text-primary); background: var(--accent); }
        .file-action-btn.delete:hover { color: var(--danger); }

        /* Search */
        .search-box {
            padding: 8px;
            border-bottom: 1px solid var(--border);
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
        }
        .search-box input:focus { border-color: var(--accent-bright); }

        /* Quick actions */
        .quick-actions {
            display: flex;
            gap: 6px;
            padding: 8px;
            flex-wrap: wrap;
        }
        .quick-btn {
            padding: 5px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: var(--accent);
            color: var(--accent-bright);
            border-color: var(--accent-bright);
        }

        /* Main chat area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-secondary);
        }
        .toggle-sidebar {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }
        .toggle-sidebar:hover { color: var(--text-primary); }
        .chat-header-info { flex: 1; }
        .chat-header-info h1 { font-size: 16px; font-weight: 600; }
        .chat-header-info p { font-size: 12px; color: var(--text-secondary); }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }
        .message {
            max-width: 80%;
            margin-bottom: 16px;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { margin-left: auto; }
        .message.assistant { margin-right: auto; }
        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user .message-bubble {
            background: var(--accent);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-bubble {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .message-bubble code {
            background: rgba(0,0,0,0.3);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 13px;
        }
        .message-bubble pre {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .message-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
            padding: 0 4px;
        }
        .message.user .message-time { text-align: right; }

        .welcome-msg {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .welcome-msg h2 {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--accent-bright);
        }
        .welcome-msg p { margin-bottom: 20px; font-size: 14px; }
        .welcome-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .welcome-chip {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .welcome-chip:hover {
            border-color: var(--accent-bright);
            color: var(--accent-bright);
        }

        /* Input */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px 12px;
        }
        .input-wrapper:focus-within { border-color: var(--accent-bright); }
        .input-wrapper textarea {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 120px;
            min-height: 24px;
            line-height: 1.5;
        }
        .send-btn {
            background: var(--accent-bright);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            transition: opacity 0.2s;
        }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .send-btn:hover:not(:disabled) { opacity: 0.85; }

        /* Loading */
        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 80px;
        }
        .typing-indicator.visible { display: inline-block; }
        .typing-dots span {
            animation: blink 1.4s infinite both;
            font-size: 18px;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a3a4e; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.visible { display: flex; }
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        .modal h3 { margin-bottom: 12px; }
        .modal textarea {
            flex: 1;
            min-height: 300px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-primary);
            font-family: 'Consolas', monospace;
            font-size: 13px;
            resize: vertical;
            outline: none;
        }
        .modal textarea:focus { border-color: var(--accent-bright); }
        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: flex-end;
        }
        .modal-btn {
            padding: 8px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .modal-btn.primary {
            background: var(--accent-bright);
            color: white;
            border-color: var(--accent-bright);
        }
        .modal-btn.secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .modal-btn:hover { opacity: 0.85; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            z-index: 200;
            animation: slideUp 0.3s;
        }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>AI Assistant</h2>
            <button class="file-action-btn" onclick="clearChat()" title="Clear chat">Clear</button>
        </div>
        <div class="sidebar-tabs">
            <div class="sidebar-tab active" data-tab="files" onclick="switchTab('files')">Files</div>
            <div class="sidebar-tab" data-tab="info" onclick="switchTab('info')">System</div>
        </div>
        <div class="sidebar-content" id="sidebarContent">
            <div id="filesPanel">
                <div class="search-box">
                    <input type="text" id="fileSearch" placeholder="Search files..." oninput="searchFiles(this.value)">
                </div>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="navigateTo('~')">Home</button>
                    <button class="quick-btn" onclick="navigateTo('Desktop')">Desktop</button>
                    <button class="quick-btn" onclick="navigateTo('Documents')">Documents</button>
                    <button class="quick-btn" onclick="navigateTo('Downloads')">Downloads</button>
                </div>
                <div class="file-path" id="filePath"></div>
                <div id="fileList"></div>
            </div>
            <div id="infoPanel" style="display:none;"></div>
        </div>
    </div>

    <!-- Main Chat -->
    <div class="main">
        <div class="chat-header">
            <button class="toggle-sidebar" onclick="toggleSidebar()">&#9776;</button>
            <div class="chat-header-info">
                <h1>AI Assistant</h1>
                <p>Ask me anything or manage your files</p>
            </div>
            <div class="status-dot" id="statusDot"></div>
        </div>
        <div class="messages" id="messages">
            <div class="welcome-msg" id="welcome">
                <h2>AI Assistant</h2>
                <p>Your personal AI assistant with file management capabilities</p>
                <div class="welcome-chips">
                    <div class="welcome-chip" onclick="sendQuick('help')">What can you do?</div>
                    <div class="welcome-chip" onclick="sendQuick('list files')">Browse Files</div>
                    <div class="welcome-chip" onclick="sendQuick('system info')">System Info</div>
                    <div class="welcome-chip" onclick="sendQuick('show me my documents')">My Documents</div>
                </div>
            </div>
            <div class="typing-indicator" id="typingIndicator">
                <span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="userInput" rows="1" placeholder="Type a message..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#10148;</button>
            </div>
        </div>
    </div>
</div>

<!-- File Editor Modal -->
<div class="modal-overlay" id="editorModal">
    <div class="modal">
        <h3 id="editorTitle">Edit File</h3>
        <textarea id="editorContent"></textarea>
        <div class="modal-actions">
            <button class="modal-btn secondary" onclick="closeEditor()">Cancel</button>
            <button class="modal-btn primary" onclick="saveFile()">Save</button>
        </div>
    </div>
</div>

<script>
const API = '';
let currentPath = '';
let currentTab = 'files';
let editingPath = '';
let messageCount = 0;

document.addEventListener('DOMContentLoaded', () => {
    loadSystemInfo();
    navigateTo('');
    document.getElementById('userInput').focus();
});

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
    document.getElementById('filesPanel').style.display = tab === 'files' ? '' : 'none';
    document.getElementById('infoPanel').style.display = tab === 'info' ? '' : 'none';
}

async function loadSystemInfo() {
    try {
        const resp = await fetch(`${API}/api/system`);
        const data = await resp.json();
        document.getElementById('infoPanel').innerHTML = `
            <div style="padding:12px; font-size:13px;">
                <div style="margin-bottom:12px; font-size:14px; font-weight:600; color:var(--accent-bright);">System Information</div>
                ${Object.entries(data).map(([k, v]) => `
                    <div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border);">
                        <span style="color:var(--text-secondary)">${k}</span>
                        <span>${v}</span>
                    </div>
                `).join('')}
            </div>
        `;
    } catch(e) {
        document.getElementById('infoPanel').innerHTML = '<div style="padding:12px;color:var(--text-muted)">Failed to load system info</div>';
    }
}

async function navigateTo(path) {
    if (path === '~') path = '';
    if (path && !path.includes(':') && !path.startsWith('/') && path !== '..') {
        path = currentPath ? currentPath + '/' + path : path;
    }
    try {
        const resp = await fetch(`${API}/api/files?path=${encodeURIComponent(path || '')}`);
        const data = await resp.json();
        if (data.error) { showToast(data.error, 'error'); return; }
        currentPath = data.path;
        document.getElementById('filePath').textContent = data.path;
        const fileList = document.getElementById('fileList');
        let html = '';
        if (data.parent !== data.path) {
            html += `<div class="file-entry" onclick="navigateTo('${escapePath(data.parent)}')">
                <span class="icon">&#128193;</span><span class="name">..</span></div>`;
        }
        data.entries.forEach(e => {
            const icon = e.is_dir ? '&#128193;' : getFileIcon(e.extension);
            const size = e.size != null ? formatSize(e.size) : '';
            html += `<div class="file-entry" ondblclick="${e.is_dir ? `navigateTo('${escapePath(e.path)}')` : `openFile('${escapePath(e.path)}')`}">
                <span class="icon">${icon}</span>
                <span class="name" title="${escapeHtml(e.path)}">${escapeHtml(e.name)}</span>
                <span class="size">${size}</span>
                <span class="actions">
                    ${!e.is_dir ? `<button class="file-action-btn" onclick="event.stopPropagation();openFile('${escapePath(e.path)}')" title="Edit">&#9998;</button>` : ''}
                    <button class="file-action-btn delete" onclick="event.stopPropagation();deleteFile('${escapePath(e.path)}','${escapeHtml(e.name)}')" title="Delete">&#10006;</button>
                </span>
            </div>`;
        });
        if (!data.entries.length) html = '<div style="padding:20px;text-align:center;color:var(--text-muted)">Empty folder</div>';
        fileList.innerHTML = html;
    } catch(e) {
        showToast('Failed to load files', 'error');
    }
}

function getFileIcon(ext) {
    const map = {'.py':'&#128013;', '.js':'&#127312;', '.html':'&#127760;', '.css':'&#127912;', '.json':'&#128196;', '.md':'&#128221;', '.txt':'&#128196;', '.png':'&#127748;', '.jpg':'&#127748;', '.gif':'&#127748;', '.zip':'&#128230;', '.mp3':'&#127925;', '.mp4':'&#127909;', '.pdf':'&#128211;', '.exe':'&#9881;', '.dll':'&#9881;'};
    return map[(ext||'').toLowerCase()] || '&#128196;';
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1048576).toFixed(1) + ' MB';
}

function escapePath(p) { return p.replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

let searchTimeout;
function searchFiles(query) {
    clearTimeout(searchTimeout);
    if (!query) { navigateTo(currentPath); return; }
    searchTimeout = setTimeout(async () => {
        const resp = await fetch(`${API}/api/search?q=${encodeURIComponent(query)}`);
        const data = await resp.json();
        const fileList = document.getElementById('fileList');
        let html = '';
        data.results.forEach(e => {
            const icon = e.is_dir ? '&#128193;' : '&#128196;';
            html += `<div class="file-entry" ondblclick="${e.is_dir ? `navigateTo('${escapePath(e.path)}')` : `openFile('${escapePath(e.path)}')`}">
                <span class="icon">${icon}</span><span class="name" title="${escapeHtml(e.path)}">${escapeHtml(e.name)}</span></div>`;
        });
        if (!data.results.length) html = '<div style="padding:20px;text-align:center;color:var(--text-muted)">No results</div>';
        fileList.innerHTML = html;
    }, 300);
}

async function openFile(path) {
    try {
        const resp = await fetch(`${API}/api/file?path=${encodeURIComponent(path)}`);
        const data = await resp.json();
        if (data.error) { showToast(data.error, 'error'); return; }
        editingPath = path;
        document.getElementById('editorTitle').textContent = path.split(/[/\\]/).pop();
        document.getElementById('editorContent').value = data.content;
        document.getElementById('editorModal').classList.add('visible');
    } catch(e) { showToast('Failed to open file', 'error'); }
}

function closeEditor() {
    document.getElementById('editorModal').classList.remove('visible');
}

async function saveFile() {
    try {
        const resp = await fetch(`${API}/api/file`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ path: editingPath, content: document.getElementById('editorContent').value })
        });
        const data = await resp.json();
        if (data.error) { showToast(data.error, 'error'); return; }
        showToast('File saved!', 'success');
        closeEditor();
        navigateTo(currentPath);
    } catch(e) { showToast('Failed to save file', 'error'); }
}

async function deleteFile(path, name) {
    if (!confirm(`Delete "${name}"?`)) return;
    try {
        const resp = await fetch(`${API}/api/file?path=${encodeURIComponent(path)}`, { method: 'DELETE' });
        const data = await resp.json();
        if (data.error) { showToast(data.error, 'error'); return; }
        showToast('Deleted!', 'success');
        navigateTo(currentPath);
    } catch(e) { showToast('Failed to delete', 'error'); }
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function sendQuick(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
}

async function sendMessage() {
    const input = document.getElementById('userInput');
    const msg = input.value.trim();
    if (!msg) return;

    if (messageCount === 0) document.getElementById('welcome').style.display = 'none';
    messageCount++;

    addMessage('user', msg);
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('typingIndicator').classList.add('visible');
    scrollToBottom();

    try {
        const resp = await fetch(`${API}/api/chat`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: msg })
        });
        const data = await resp.json();
        addMessage('assistant', data.response);
        if (data.action === 'list_files' && data.data?.path) {
            navigateTo(data.data.path);
            switchTab('files');
        }
    } catch(e) {
        addMessage('assistant', 'Connection error. Make sure the server is running.');
    }

    document.getElementById('typingIndicator').classList.remove('visible');
    document.getElementById('sendBtn').disabled = false;
    scrollToBottom();
}

function addMessage(role, content) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    div.innerHTML = `<div class="message-bubble">${formatMessage(content)}</div><div class="message-time">${time}</div>`;
    const typing = document.getElementById('typingIndicator');
    typing.parentNode.insertBefore(div, typing);
}

function formatMessage(text) {
    text = escapeHtml(text);
    text = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    return text;
}

function scrollToBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
}

function showToast(msg, type = '') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

async function clearChat() {
    if (!confirm('Clear chat history?')) return;
    await fetch(`${API}/api/history`, { method: 'DELETE' });
    document.querySelectorAll('.message').forEach(m => m.remove());
    document.getElementById('welcome').style.display = '';
    messageCount = 0;
    showToast('Chat cleared', 'success');
}
</script>
</body>
</html>
